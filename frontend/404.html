<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Not found — BloomBuddy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..600,30..100;1,9..144,400..500,30..100&family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="Images/favicon.png" />
  <meta name="theme-color" content="#FFFDF9" />

  <script src="vendor/lucide.min.js" defer></script>

  <style>
    .lost-main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }
    .lost-card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: 56px 32px;
      background: var(--bb-paper-2);
      border: 1px solid var(--bb-line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
    }
    .lost-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: var(--radius-full);
      background: var(--bb-sage-soft);
      color: var(--bb-ink);
      margin-bottom: 24px;
    }
    .lost-icon svg { width: 26px; height: 26px; stroke-width: 1.5; }
    .lost-eyebrow {
      display: inline-block;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--bb-ink-3);
      margin-bottom: 14px;
    }
    .lost-title {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 36px;
      letter-spacing: -0.025em;
      color: var(--bb-ink);
      margin: 0 0 14px;
      line-height: 1.1;
      font-variation-settings: "opsz" 144, "SOFT" 30;
    }
    .lost-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--bb-ink-2);
      font-variation-settings: "opsz" 144, "SOFT" 100;
    }
    .lost-body {
      font-size: 15px;
      line-height: 1.65;
      color: var(--bb-ink-3);
      margin: 0 0 28px;
      max-width: 36ch;
      margin-left: auto;
      margin-right: auto;
    }
    .lost-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .lost-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: var(--radius-full);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: transform var(--t-fast), background var(--t-fast), border-color var(--t-fast);
      border: 1px solid transparent;
    }
    .lost-btn.primary { background: var(--bb-ink); color: var(--bb-paper); }
    .lost-btn.primary:hover { background: var(--bb-ink-2); transform: translateY(-1px); }
    .lost-btn.ghost {
      background: var(--bb-paper-2);
      color: var(--bb-ink);
      border-color: var(--bb-line-2);
    }
    .lost-btn.ghost:hover { background: var(--bb-paper-3); border-color: var(--bb-line-3); }
    .lost-btn svg { width: 14px; height: 14px; stroke-width: 1.75; }

    @media (max-width: 480px) {
      .lost-card { padding: 40px 22px; border-radius: var(--radius-lg); }
      .lost-title { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main class="lost-main">
    <div class="lost-card">
      <span class="lost-icon">
        <i data-lucide="compass" aria-hidden="true"></i>
      </span>
      <span class="lost-eyebrow">404</span>
      <h1 class="lost-title">A quiet <em>detour</em></h1>
      <p class="lost-body">This page doesn't exist — or it slipped away. No worries. Let's get you somewhere gentler.</p>
      <div class="lost-actions">
        <a href="dashboard.html" class="lost-btn primary">
          Return to companion
          <i data-lucide="arrow-right" aria-hidden="true"></i>
        </a>
        <a href="index.html" class="lost-btn ghost">
          <i data-lucide="home" aria-hidden="true"></i>
          Home
        </a>
      </div>
    </div>
  </main>

  <script>
    (function () {
      function mount() {
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
          window.lucide.createIcons({ attrs: { 'stroke-width': '1.5' } });
        }
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount);
      else mount();
      window.addEventListener('load', mount);
    })();
  </script>
</body>
</html>
