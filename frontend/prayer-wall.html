  <script type="module" src="firebase-config.js"></script>

</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-text">BB</div>
      <span class="brand-name">BloomBuddy</span>
    </div>

    <nav class="desktop-nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="journal.html">Journal</a>
      <a href="prayer-wall.html" class="active">Prayer Wall</a>
      <a href="resources.html">Resources</a>
      <a href="programs.html">Programs</a>
    </nav>

    <div class="user-menu">
      <div class="profile-avatar" id="profileAvatar">
        <span id="userInitial">B</span>
      </div>
      <div class="profile-dropdown" id="profileDropdown">
        <div class="dropdown-header">
          <span id="dropdownUserEmail">user@email.com</span>
        </div>
        <a href="profile.html" class="dropdown-item">
          <svg class="dropdown-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" /></svg>

  <main class="prayer-main">
    <div class="prayer-container">
      <div class="prayer-header">
        <h1>рџ™Џ Prayer Wall</h1>

      </div>

      <!-- Category Filters -->
      <div class="prayer-filters" id="prayerFilters">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="healing">рџ©№ Healing</button>
        <button class="filter-btn" data-category="guidance">рџ§­ Guidance</button>

          <span class="toggle-icon">вњЌпёЏ</span>
          <span>Share a Prayer Request</span>
          <span class="toggle-arrow" id="toggleArrow">в–ё</span>
        </div>
        <div class="prayer-form-body" id="prayerFormBody" style="display: none;">
          <div class="prayer-form-row">
            <label class="prayer-label">Category</label>
            <div class="prayer-category-options" id="prayerCategoryOptions">
              <button class="cat-btn" data-category="healing">рџ©№ Healing</button>

            </div>
          </div>
          <textarea id="prayerText" class="prayer-textarea" placeholder="What's on your heart? Share your prayer request..." rows="4"></textarea>
          <div class="prayer-form-footer">
            <label class="prayer-anonymous-toggle">
              <input type="checkbox" id="prayerAnonymous" checked />
              <span>Post anonymously</span>
            </label>
            <button id="prayerSubmitBtn" class="prayer-submit-btn" disabled>
              Share Prayer

          </div>
        </div>
      </section>

      <!-- Prayer Feed -->
      <section class="prayer-feed" id="prayerFeed">
        <div class="prayer-loading" id="prayerLoading">Loading prayers...</div>
        <div class="prayer-empty" id="prayerEmpty" style="display: none;">

    </div>

</body>
</html>
